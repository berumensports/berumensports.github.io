<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="icon" href="./img/favicon.ico" />
  <title>Berumen Sports • Liga 2025</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="./css/berumen.css" />
  <link rel="stylesheet" href="./css/desktop-fixes.css" />
</head>
<body>
  <header class="topbar">
    <button id="menu-btn" class="btn-icon menu-button" aria-label="Menú">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <h1 class="topbar-title">Berumen Sports • Liga 2025</h1>
    <div class="topbar-user">
      <span id="user-role" class="badge"></span>
      <span id="user-email" class="truncate"></span>
      <button id="logout-btn" class="btn btn-danger btn-xs">Salir</button>
    </div>
  </header>
  <aside class="sidedrawer" hidden>
    <nav>
      <a href="#/">Dashboard</a>
      <a href="#/partidos">Partidos</a>
      <a href="#/equipos">Equipos</a>
      <a href="#/cobros">Cobros</a>
      <a href="#/delegaciones">Delegaciones</a>
      <a href="#/tarifas">Tarifas</a>
      <a href="#/reportes">Reportes</a>
    </nav>
  </aside>
  <main id="app" class="container"></main>
  <nav class="tabbar">
    <a href="#/" data-tab="home"><span class="material-symbols-outlined">home</span><span class="tab-label">Inicio</span></a>
    <a href="#/partidos" data-tab="partidos"><span class="material-symbols-outlined">sports</span><span class="tab-label">Partidos</span></a>
    <a href="#/equipos" data-tab="equipos"><span class="material-symbols-outlined">groups</span><span class="tab-label">Equipos</span></a>
    <a href="#/cobros" data-tab="cobros"><span class="material-symbols-outlined">payments</span><span class="tab-label">Cobros</span></a>
    <a href="#/more" data-tab="more"><span class="material-symbols-outlined">more_horiz</span><span class="tab-label">Más</span></a>
  </nav>
  <div id="toaster"></div>
  <div id="modal-root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
  <script type="module" src="./js/desktop-layout.js"></script>
  <script type="module" src="./js/app.js"></script>
  <noscript>Necesitas habilitar JavaScript para usar esta aplicación.</noscript>
</body>
</html>
